name: Daily ParlayOS Update
on:
  schedule:
    - cron: '0 9 * * *'    # Runs daily at 9:00 UTC
  workflow_dispatch:        # Allows manual trigger

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python mlb_ace.py && python mlb_backtest.py
      - name: Commit and push changes
        run: |
          git config user.name "github-ace"
          git config.user.email "github-ace@example.com"
          git add mlb_config.json picks_logs.csv/ parlayos.html
          git diff --staged --quiet || git commit -m "auto-update: picks, config, and live HTML data"
          git push
