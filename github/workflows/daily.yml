name: Daily Parlay Update
on:
  schedule:
    - cron: '0 9 * * *'   # daily at 9 AM UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python mlb_ace.py && python mlb_backtest.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@example.com"
          git add config.json picks_logs/
          git diff --staged --quiet || git commit -m "Auto-update picks and config"
          git push
