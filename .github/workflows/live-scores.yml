name: Update Live MLB Scores

on:
  schedule:
    - cron: '*/15 14-23 * * *'   # 10am-7pm ET
    - cron: '*/15 0-7 * * *'     # 8pm-3am ET
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz

      - name: Run live scores script
        id: run-script
        run: |
          set -o pipefail
          python live_mlb_scores.py 2>&1 | tee live_mlb_run.log
          echo "SCRIPT_EXIT=$?" >> $GITHUB_OUTPUT
          
          if [ -f mlb_live.json ]; then
            echo "--- mlb_live.json exists ---"
            ls -lh mlb_live.json
            python -c "import json; d=json.load(open('mlb_live.json')); print(f\"Games: {d['game_count']}, Updated: {d['last_updated']}\")"
          else
            echo "ERROR: mlb_live.json NOT created"
            exit 1
          fi

      - name: Commit and push
        env:
          PAT: ${{ secrets.GITHUB_PAT }}
        run: |
          git config user.name "Live Scores Bot"
          git config user.email "actions@github.com"
          git add mlb_live.json
          
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          
          git commit -m "Update live scores $(date -u +'%H:%M UTC')"
          
          if [ -n "$PAT" ]; then
            git remote set-url origin https://$PAT@github.com/${{ github.repository }}.git
          fi
          
          git push origin HEAD:main || {
            echo "PUSH FAILED - check branch protection"
            exit 1
          }
