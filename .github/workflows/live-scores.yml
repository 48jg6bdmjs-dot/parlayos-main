name: Update Live Scores

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes - updates live + final scores
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'live_scores.json'
      - 'live_scores_fetcher.py'
      - 'live-scores.yml'
      - '.github/workflows/live-scores.yml'
      - 'parlayos_3.html'
      - 'parlayos.html'
      - 'index.html'

concurrency:
  group: live-scores
  cancel-in-progress: true

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install deps
        run: |
          pip install requests
          
      - name: Fetch live + final scores for all hubs
        run: |
          echo "Fetching live + final scores for calendars..."
          python live_scores_fetcher.py
          echo "Done. Checking output..."
          ls -lh live_scores.json data/live_scores.json 2>/dev/null || ls -lh live_scores.json
          cat live_scores.json | head -100
          
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Live Scores"
          git add live_scores.json data/live_scores.json live-scores.yml .github/workflows/live-scores.yml parlayos_3.html parlayos.html index.html 2>/dev/null || true
          git diff --staged --quiet && echo "No changes" || (git commit -m "ðŸ”´ Update live scores - $(date -u) - ${{ github.event_name }}" && git push)
