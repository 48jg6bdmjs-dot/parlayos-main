name: Update Live Scores

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes - updates final scores for calendars
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'live_scores.yml'
      - 'data/live_scores.yml'
      - 'live_scores_fetcher.py'

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install deps
        run: |
          pip install requests pyyaml
          
      - name: Fetch live final scores for all hubs
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          echo "Fetching live scores for calendar final scores..."
          python live_scores_fetcher.py
          echo "Updating game data..."
          python mlb_ace.py || echo "MLB skipped"
          python nfl_ace.py || echo "NFL skipped"
          python nba_ace_2.py || echo "NBA skipped"
          
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Live Scores"
          git add live_scores.json data/live_scores.json live_scores.yml parlayos.html 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "🔴 Update live scores - $(date -u) - Finals for calendars" && git push)