name: Update Live MLB Scores

on:
  schedule:
    - cron: '*/15 22-6 * * *'  # Every 15min from 6pm-2am ET during games
  workflow_dispatch:  # Lets you run manually

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # This lets the Action push commits
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run live scores script
        run: python live_mlb_scores.py
        
      - name: Commit and push if changed
        run: |
          git config user.name "Live Scores Bot"
          git config user.email "actions@github.com"
          git add mlb_live.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update live scores $(date -u +'%H:%M UTC')"
          git push