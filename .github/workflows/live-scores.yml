name: Update Live MLB Scores

on:
  schedule:
    - cron: '*/15 14-23 * * *'   # Every 15 min, 10am–7:59pm ET
    - cron: '*/15 0-7 * * *'     # Every 15 min, 8pm–3am ET
  workflow_dispatch:

jobs:
  update-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run live score fetcher
        run: python live_mlb_scores.py

      - name: Commit and push updated mlb_live.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mlb_live.json
          git diff --cached --quiet || git commit -m "chore: update live scores [skip ci]"
          git push
