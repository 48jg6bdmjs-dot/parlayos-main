name: Update Live Scores (LIVE ONLY)

on:
  schedule:
    # Every 5 minutes, 24/7 - ESPN only returns LIVE when games are on
    # If you want only noon-midnight ET, use: '*/5 16-23,0-4 * * *'
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-live-scores:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install deps
        run: |
          pip install requests
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
      
      - name: Fetch LIVE games only
        run: |
          python live_scores_fetcher.py
          echo "--- live_scores.json ---"
          cat live_scores.json | head -n 150
          echo "Count: $(jq '.count' live_scores.json)"
          echo "Updated: $(jq -r '.updated' live_scores.json)"
      
      - name: Commit if changed
        run: |
          git config user.name "parlayos-bot"
          git config user.email "bot@parlayos.app"
          git add live_scores.json
          if git diff --staged --quiet; then
            echo "No live games changed - skip commit"
          else
            COUNT=$(jq -r '.count' live_scores.json)
            git commit -m "live: ${COUNT} live games - $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git push
          fi
