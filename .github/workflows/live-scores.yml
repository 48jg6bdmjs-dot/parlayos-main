name: Update Live MLB Scores

on:
  schedule:
    - cron: '*/15 22-6 * * *'  # Every 15min from 6pm-2am ET during games
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python live_mlb_scores.py
      - run: |
          git config user.name "Live Scores Bot"
          git config user.email "actions@github.com"
          git add mlb_live.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Live scores update $(date -u +'%H:%M UTC')"
          git push
