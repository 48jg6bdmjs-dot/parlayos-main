name: Update Live Scores (LIVE ONLY)

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update-live-scores:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install deps
        run: pip install requests
      
      - name: Fetch LIVE games only
        run: |
          python live_scores_fetcher.py
          echo "--- live_scores.json ---"
          cat live_scores.json | head -n 100
          echo "Count: $(jq '.count' live_scores.json)"
      
      - name: Commit if changed
        run: |
          git config user.name "parlayos-bot"
          git config user.email "bot@parlayos.app"
          git add live_scores.json
          if git diff --staged --quiet; then
            echo "No live games changed - skip commit"
          else
            COUNT=$(jq -r '.count' live_scores.json)
            git commit -m "live: ${COUNT} live games - $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git push
          fi
