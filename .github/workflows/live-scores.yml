name: Update Live Scores (LIVE ONLY)

on:
  schedule:
    # AUTOMATIC: Starts at 12pm UTC daily, runs for 12 hours until 12am
    # For 12pm-12am Eastern, change to: '0 16 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-scores
  cancel-in-progress: false

jobs:
  update-live-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 750  # 12.5 hours max - covers full 12pm-12am window
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install deps
        run: pip install requests
      
      - name: Run automatic loop 12pm-12am
        run: |
          git config user.name "parlayos-bot"
          git config user.email "bot@parlayos.app"
          
          START=$(date +%s)
          END=$((START + 43200))  # 12 hours = 43200 seconds
          
          echo "Starting automatic loop: $(date) - will end at $(date -d @$END)"
          
          while [ $(date +%s) -lt $END ]; do
            echo "=== Fetching at $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
            
            python live_scores_fetcher.py || echo "Fetch failed, retrying next loop"
            
            if [ -f live_scores.json ]; then
              echo "Count: $(jq -r '.count // 0' live_scores.json 2>/dev/null || echo 'unknown')"
              
              git add live_scores.json
              if ! git diff --staged --quiet; then
                COUNT=$(jq -r '.count // 0' live_scores.json 2>/dev/null || echo '0')
                git commit -m "live: ${COUNT} games - $(date -u +%H:%M:%SZ) [skip ci]" || true
                git push || (git pull --rebase && git push) || true
              else
                echo "No changes"
              fi
            fi
            
            # Sleep 5 minutes (300s) before next fetch
            echo "Sleeping 5 min..."
            sleep 300
          done
          
          echo "Finished 12-hour window at $(date)"
