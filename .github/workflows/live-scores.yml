name: Update Live MLB Scores
on:
  schedule:
    - cron: '*/15 14-23 * * *'  # 10am-7pm ET
    - cron: '*/15 0-7 * * *'    # 8pm-3am ET
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - run: python live_mlb_scores.py
      - run: |
          git config user.name "acebot"
          git config user.email "acebot@users.noreply.github.com"
          git add mlb_live.json
          git diff --cached --quiet || (git commit -m "live update $(date -u +%H:%M)" && git push)