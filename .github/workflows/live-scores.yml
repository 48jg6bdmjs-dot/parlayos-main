name: Update Live Scores

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parlayos-main-push
  cancel-in-progress: false

jobs:
  update-live-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install requests python-dateutil
          echo "__pycache__/" >> .gitignore

      - name: Fetch LIVE + push to parlayos.html
        run: |
          python live_scores_fetcher.py
          cat live_scores.json | head -n 30 || true
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "parlayos-bot"
          git config user.email "bot@parlayos.app"
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          git add live_scores.json parlayos.html || true
          git reset -- __pycache__/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          COUNT=$(jq -r '.count // 0' live_scores.json 2>/dev/null || echo 0)
          git commit -m "live: ${COUNT} games to parlayos.html [skip ci]" || true
          for i in 1 2 3 4 5; do git pull --rebase origin main && break; sleep 3; done
          for i in 1 2 3 4 5; do git push origin main && break; git pull --rebase origin main || true; sleep 2; done
