name: Daily ParlayOS Update

# â”€â”€ ACE V3 ULTRA â€” 3x daily schedule â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Runs every 6 hours to catch line movement + lineup confirmations + final highlights
# 9:00 UTC  = 5:00 AM ET â€” overnight lines, early market
# 15:00 UTC = 11:00 AM ET â€” injury reports, lineup hints
# 21:00 UTC = 5:00 PM ET â€” final lineups, weather, closing highlights (most accurate)
"on":
  schedule:
    - cron: '0 9 * * *'     # 9:00 UTC â€” early market scan
    - cron: '0 15 * * *'    # 15:00 UTC â€” midday injury/lineup update
    - cron: '0 21 * * *'    # 21:00 UTC â€” final close to game time (highest edge)
  workflow_dispatch:         # Allows manual trigger from the GitHub UI

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt

      # â”€â”€ run_all.py V3 ULTRA â€” MLB + NBA + NFL with highlights â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # Parallel fetching, multi-book Pinnacle-weighted consensus, Monte Carlo totals,
      # weather V3 wind vector vs park orientation, WAR-weighted injuries, real probables
      - name: Run all three prediction engines (MLB, NFL, NBA) V3 ULTRA
        run: python run_all.py || echo "::warning::run_all.py reported at least one sport failed â€” see log above for which. Continuing to commit whatever succeeded."

      # mlb_backtest.py tunes MLB's thresholds in sports_config.json
      # (min_edge, min/max_total_line) against graded outcomes.
      - run: python mlb_backtest.py || echo "::warning::mlb_backtest.py failed â€” see log above. Continuing to commit whatever picks succeeded this run."

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # â”€â”€ Add each file only if it exists â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          for f in sports_config.json picks_log.csv nfl_picks_log.csv nba_picks_log.csv parlayos.html; do
            if [ -f "$f" ]; then
              git add "$f"
            else
              echo "::notice::$f does not exist yet â€” skipping (this is expected on a first run, or if that sport's engine hasn't successfully generated picks yet)"
            fi
          done

          git diff --staged --quiet || git commit -m "auto-update: MLB/NFL/NBA V3 ULTRA picks, highlights + config (3x daily)"
          git push
