name: Daily ParlayOS Update

# â”€â”€ ACE V3 ULTRA â€” 3x daily schedule â”€â”€
# Runs every 6 hours to catch line movement + lineup confirmations + final highlights
# 9:00 UTC  = 5:00 AM ET â€” overnight lines, early market
# 15:00 UTC = 11:00 AM ET â€” injury reports, lineup hints
# 21:00 UTC = 5:00 PM ET â€” final lineups, weather, closing highlights (most accurate)
on:
  schedule:
    - cron: '0 9 * * *'     # 9:00 UTC â€” early market scan
    - cron: '0 15 * * *'    # 15:00 UTC â€” midday injury/lineup update
    - cron: '0 21 * * *'    # 21:00 UTC â€” final close to game time (highest edge)
  workflow_dispatch:         # Allows manual trigger from the GitHub UI

permissions:
  contents: write

# Prevent two daily runs from colliding, queue them
concurrency:
  group: parlayos-main
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt

      # â”€â”€ run_all.py V3 ULTRA â€” MLB + NBA + NFL with highlights â”€â”€
      - name: Run all three prediction engines (MLB, NFL, NBA) V3 ULTRA
        run: python run_all.py || echo "::warning::run_all.py reported at least one sport failed â€” see log above for which. Continuing to commit whatever succeeded."

      - run: python mlb_backtest.py || echo "::warning::mlb_backtest.py failed â€” see log above. Continuing to commit whatever picks succeeded this run."

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for f in sports_config.json picks_log.csv nfl_picks_log.csv nba_picks_log.csv parlayos.html; do
            if [ -f "$f" ]; then
              git add "$f"
            else
              echo "::notice::$f does not exist yet â€” skipping"
            fi
          done

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "auto-update: MLB/NFL/NBA V3 ULTRA picks, highlights + config (3x daily)"

          # FIX: Pull remote changes first to avoid [rejected] fetch first errors
          # This handles race with live-scores.yml pushing at same time
          echo "Pulling latest main with rebase..."
          git pull --rebase --autostash origin main || {
            echo "Rebase failed, trying merge strategy"
            git rebase --abort || true
            git pull --no-rebase origin main || true
          }

          # Push with retry loop (3 attempts)
          for i in 1 2 3; do
            echo "Push attempt $i..."
            if git push origin main; then
              echo "Push succeeded"
              exit 0
            fi
            echo "Push failed, pulling again and retrying in 5s..."
            sleep 5
            git pull --rebase --autostash origin main || true
          done

          echo "All push attempts failed"
          exit 1
