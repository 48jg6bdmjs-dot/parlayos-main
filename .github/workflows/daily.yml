name: Daily Acebot Rebuild
on:
  schedule:
    - cron: '0 14 * * *' # 10am ET every day (14:00 UTC)
  workflow_dispatch: # lets you run it manually too
jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify
        run: curl -X POST -d {} "https://api.netlify.com/build_hooks/YOUR_ID_HERE"
