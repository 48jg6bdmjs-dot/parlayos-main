name: ParlayOS Weekly Update

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Need full history for rebase

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          pip install requests
          # Ensure __pycache__ is ignored
          echo "__pycache__/" >> .gitignore
          echo "*.pyc" >> .gitignore
          echo "*.pyo" >> .gitignore
          echo ".pytest_cache/" >> .gitignore

      - name: Run weekly update
        run: |
          # Your weekly update script here - adjust as needed
          python mlb_ace.py || true
          python nfl_ace.py || true
          python nba_ace.py || true
          # Remove any pycache that was created
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true

      - name: Commit updates
        run: |
          git config user.name "parlayos-bot"
          git config user.email "bot@parlayos.app"

          # Clean pycache BEFORE adding
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true
          
          # Add only relevant files, exclude pycache explicitly
          git add -A
          git reset -- __pycache__/ 2>/dev/null || true
          git reset -- "*.pyc" 2>/dev/null || true
          git reset -- "**/__pycache__/**" 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "weekly: update $(date -u +%Y-%m-%d) [skip ci]"

          # FIX FOR YOUR ERROR: pull --rebase before push to handle non-fast-forward
          # This happens when live-scores job pushed while weekly was running
          echo "Pulling latest changes with rebase..."
          git pull --rebase origin main || (echo "Rebase failed, trying merge" && git pull --no-rebase origin main)

          echo "Pushing..."
          git push origin main || (git push --force-with-lease origin main)

          echo "Weekly update complete"

      - name: Post Run cleanup
        if: always()
        run: |
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
