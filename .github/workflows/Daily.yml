name: Daily ParlayOS Update
on:
  schedule:
    - cron: '12 0 * * *'    # Runs daily at 12:00 UTC
  workflow_dispatch:        # Allows manual trigger

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python mlb_ace.py && python mlb_backtest.py
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]"
          git add config.json picks_logs/
          git diff --staged --quiet || git commit -m "auto"
          git push
